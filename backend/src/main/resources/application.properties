spring.application.name=safe-community-ai-backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
server.port=${SERVER_PORT:8082}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/safecommunityai_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:SafeCommunityAISecretKeyForLocalDevelopmentOnlyChangeMe123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8081,http://localhost:5173}
app.otp.email.enabled=${OTP_EMAIL_ENABLED:false}
app.otp.email.from=${OTP_EMAIL_FROM:no-reply@safecommunityai.local}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:120MB}

